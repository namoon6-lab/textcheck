// =======================
// 와일드카드 변환
// * = 정확히 한 글자
// =======================
function wildcardToRegex(pattern) {
    const escaped = pattern.replace(/[.+?^${}()|[\]\\]/g, '\\$&');

    // * → 한 글자 (공백 제외)
    const regex = escaped.replace(/\*/g, '([^\\s])');

    return new RegExp(regex, 'g');
}

// =======================
// 검사
// =======================
function checkSpacing() {
    const text = document.getElementById("inputText").value;
    const resultDiv = document.getElementById("result");

    let errors = [];

    dictionary.forEach(item => {
        const regex = wildcardToRegex(item.wrong);
        let match;

        while ((match = regex.exec(text)) !== null) {
            let found = match[0];
            let suggestion = item.correct;

            // * 치환
            if (item.correct.includes("*")) {
                suggestion = suggestion.replace("*", match[1]);
            }

            errors.push(`❌ <b>${found}</b> → <b>${suggestion}</b>`);
        }
    });

    if (errors.length === 0) {
        resultDiv.innerHTML =
            `<p class="good">오류가 발견되지 않았습니다.</p>`;
    } else {
        resultDiv.innerHTML =
            `<h3>발견된 띄어쓰기 오류</h3>` +
            errors.map(e => `<div class="error">${e}</div>`).join("");
    }
}
